<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management CMS - Add Student</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <div class="container mt-5 main-content">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h3 class="text-primary text-center">Add New Student</h3>
                    </div>
                    <div class="card-body p-4">
                        <!-- Alert block for success/error -->
                        <div id="alert-box"></div>

                        <form id="add-student-form" novalidate onsubmit="submitForm(event)">
                            <div class="row mb-3">
                                <div class="col-md-6 form-group">
                                    <label class="form-label fw-bold">Full Name</label>
                                    <input type="text" class="form-control bg-light border-0" id="name" required placeholder="ex. John Doe">
                                    <div class="invalid-feedback">Please enter a valid name.</div>
                                </div>
                                <div class="col-md-6 form-group">
                                    <label class="form-label fw-bold">Enrollment Number</label>
                                    <input type="text" class="form-control bg-light border-0" id="enrollmentNumber" required placeholder="ex. CS202201">
                                    <div class="invalid-feedback">Enrollment number is required.</div>
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6 form-group">
                                    <label class="form-label fw-bold">Branch</label>
                                    <select class="form-select bg-light border-0" id="branch" required>
                                        <option value="" selected disabled>Select Branch</option>
                                        <option value="CSE">Computer Science</option>
                                        <option value="IT">Information Technology</option>
                                        <option value="ECE">Electronics</option>
                                        <option value="ME">Mechanical</option>
                                    </select>
                                    <div class="invalid-feedback">Please select a branch.</div>
                                </div>
                                <div class="col-md-6 form-group">
                                    <label class="form-label fw-bold">Year</label>
                                    <select class="form-select bg-light border-0" id="year" required>
                                        <option value="" selected disabled>Select Year</option>
                                        <option value="1st Year">1st Year</option>
                                        <option value="2nd Year">2nd Year</option>
                                        <option value="3rd Year">3rd Year</option>
                                        <option value="4th Year">4th Year</option>
                                    </select>
                                    <div class="invalid-feedback">Please select an academic year.</div>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6 form-group">
                                    <label class="form-label fw-bold">Email Address</label>
                                    <input type="email" class="form-control bg-light border-0" id="email" required placeholder="name@domain.com">
                                    <div class="invalid-feedback">Please provide a valid email.</div>
                                </div>
                                <div class="col-md-6 form-group">
                                    <label class="form-label fw-bold">Phone Number</label>
                                    <input type="tel" class="form-control bg-light border-0" id="phoneNumber" required pattern="[0-9]{10}" placeholder="10 digit mobile">
                                    <div class="invalid-feedback">Please enter a valid 10-digit number.</div>
                                </div>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm" id="submit-btn">
                                    Save Record
                                    <span class="spinner-border spinner-border-sm d-none" id="submit-spinner" role="status" aria-hidden="true"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
