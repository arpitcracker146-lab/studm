<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management CMS - View Records</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <div class="container mt-5 main-content">
        <div class="row align-items-center mb-3">
            <div class="col-md-6">
                <h2 class="text-primary m-0 fw-bold">Student Records <span id="record-count" class="badge bg-secondary fs-6 align-middle ms-2"></span></h2>
            </div>
            <div class="col-md-6 mt-3 mt-md-0 d-flex justify-content-md-end">
                <input type="text" id="searchInput" class="form-control w-75 shadow-sm border-0 me-2" placeholder="Search by name or enrollment..." onkeyup="searchStudent()">
                <a href="add.html" class="btn btn-primary shadow-sm"><i class="bi bi-plus-lg"></i></a>
            </div>
        </div>

        <div id="alert-box"></div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0 table-responsive text-nowrap">
                <div id="loading-table" class="text-center p-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                <table class="table table-hover align-middle mb-0 d-none" id="students-table">
                    <thead class="table-light">
                        <tr>
                            <th>Enrollment No.</th>
                            <th>Full Name</th>
                            <th>Branch</th>
                            <th>Year</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
                <div id="empty-state" class="text-center p-5 d-none">
                    <i class="bi bi-folder-x text-muted" style="font-size: 3rem;"></i>
                    <h5 class="mt-3 text-muted">No students found.</h5>
                </div>
            </div>
        </div>
    </div>

    <!-- Update Modal -->
    <div class="modal fade" id="updateModal" tabindex="-1" aria-labelledby="updateModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-primary" id="updateModalLabel">Edit Student Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <!-- Modal Body with Form -->
                <div class="modal-body p-4">
                    <form id="update-student-form" onsubmit="submitUpdate(event)">
                        <input type="hidden" id="upd-id">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control bg-light border-0" id="upd-name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Enrollment Number</label>
                            <input type="text" class="form-control bg-light border-0" id="upd-enrollment" readonly>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Branch</label>
                                <select class="form-select bg-light border-0" id="upd-branch" required>
                                    <option value="CSE">Computer Science</option>
                                    <option value="IT">Information Technology</option>
                                    <option value="ECE">Electronics</option>
                                    <option value="ME">Mechanical</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Year</label>
                                <select class="form-select bg-light border-0" id="upd-year" required>
                                    <option value="1st Year">1st Year</option>
                                    <option value="2nd Year">2nd Year</option>
                                    <option value="3rd Year">3rd Year</option>
                                    <option value="4th Year">4th Year</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control bg-light border-0" id="upd-email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Phone</label>
                            <input type="text" class="form-control bg-light border-0" id="upd-phone" required pattern="[0-9]{10}">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" id="update-btn">
                                Update changes
                                <span class="spinner-border spinner-border-sm d-none" id="update-spinner" role="status" aria-hidden="true"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-4">
                    <i class="bi bi-exclamation-circle text-danger mb-3" style="font-size: 3rem;"></i>
                    <h5>Are you sure?</h5>
                    <p class="text-muted">Do you really want to delete this record? This cannot be undone.</p>
                    <input type="hidden" id="del-id">
                    <div class="d-flex justify-content-center gap-2 mt-4">
                        <button type="button" class="btn btn-secondary w-50" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger w-50" onclick="confirmDelete()">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/script.js"></script>
    <script>
        // Load table data on page load
        document.addEventListener('DOMContentLoaded', fetchStudents);
    </script>
</body>
</html>
