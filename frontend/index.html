<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management CMS - Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <!-- Navbar Wrapper (Injected via JS) -->
    <div id="navbar-container"></div>

    <div class="container mt-5 main-content">
        <div class="row align-items-center mb-4">
            <div class="col-md-6">
                <h1 class="display-5 fw-bold text-primary">Dashboard</h1>
                <p class="text-muted">Welcome to the Student Management System.</p>
            </div>
            <div class="col-md-6 text-md-end">
                <a href="add.html" class="btn btn-primary btn-lg shadow-sm">
                    <i class="bi bi-person-plus-fill me-2"></i> Add New Student
                </a>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0 h-100 summary-card text-center p-4">
                    <div class="card-body">
                        <i class="bi bi-people-fill text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-3" id="total-students">Loading...</h2>
                        <h5 class="text-secondary">Total Students</h5>
                    </div>
                </div>
            </div>
            
            <div class="col-md-8 mb-4">
                <div class="card shadow-sm border-0 h-100">
                    <div class="card-body d-flex flex-column justify-content-center text-center p-4">
                        <i class="bi bi-gear-wide-connected text-success mb-3" style="font-size: 3rem;"></i>
                        <h4>Quick Actions</h4>
                        <div class="mt-3">
                            <a href="view.html" class="btn btn-outline-success me-2">View & Manage Records</a>
                            <a href="about.html" class="btn btn-outline-secondary">About Project</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Wrapper (Injected via JS) -->
    <div id="footer-container"></div>

    <!-- Bootstrap JS and App JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/components.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
